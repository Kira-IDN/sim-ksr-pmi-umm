name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install Frontend Dependencies
      run: npm ci

    - name: Build Frontend
      run: npm run build

    - name: Lint Frontend
      run: npm run lint

    - name: Install Backend Dependencies
      working-directory: ./server
      run: npm ci

    - name: Build Backend
      working-directory: ./server
      run: npm run build
